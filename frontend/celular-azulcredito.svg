<svg viewBox="0 0 300 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Celular -->
  <rect x="20" y="20" width="260" height="560" rx="30" fill="#1a1a1a" stroke="#333" stroke-width="2"/>

  <!-- Tela -->
  <rect x="30" y="50" width="240" height="500" rx="20" fill="#ffffff"/>

  <!-- Gradient background da tela -->
  <defs>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="30" y="50" width="240" height="500" rx="20" fill="url(#screenGradient)"/>

  <!-- Header -->
  <text x="150" y="100" font-size="20" font-weight="bold" fill="white" text-anchor="middle">AzulCrédito</text>

  <!-- Logo/Icon -->
  <circle cx="150" cy="180" r="40" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="190" font-size="50" fill="white" text-anchor="middle" font-weight="bold">💰</text>

  <!-- Texto principal -->
  <text x="150" y="250" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Simule seu</text>
  <text x="150" y="270" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Empréstimo</text>

  <!-- Botão -->
  <rect x="50" y="300" width="200" height="50" rx="10" fill="white"/>
  <text x="150" y="335" font-size="12" font-weight="bold" fill="#667eea" text-anchor="middle">COMECE AGORA</text>

  <!-- Features -->
  <circle cx="70" cy="390" r="4" fill="white"/>
  <text x="85" y="395" font-size="10" fill="white">Rápido e Seguro</text>

  <circle cx="70" cy="420" r="4" fill="white"/>
  <text x="85" y="425" font-size="10" fill="white">PIX em 5 minutos</text>

  <circle cx="70" cy="450" r="4" fill="white"/>
  <text x="85" y="455" font-size="10" fill="white">Zero taxa</text>

  <!-- Notch -->
  <rect x="120" y="25" width="60" height="20" rx="5" fill="#1a1a1a"/>
</svg>
